name: Deploy to GitHub Pages

# Сборка фронтенда и публикация на GitHub Pages при каждом push в main.
# Ключи облачного Supabase берутся из секретов репозитория:
#   Settings → Secrets and variables → Actions → New repository secret
#     VITE_SUPABASE_URL       = https://<твой-проект>.supabase.co
#     VITE_SUPABASE_ANON_KEY  = <anon public key>
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Для Pages рекомендуется НЕ прерывать идущий деплой (иначе среда github-pages
# остаётся с «зависшей» публикацией и следующие деплои падают). Ставим в очередь.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Проверки качества: линтер + автотесты. Если падают — сборка/деплой не запустятся.
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install --no-audit --no-fund
      - name: Lint
        run: npm run lint
      - name: Tests
        run: npm test

  build:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install --no-audit --no-fund
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      # SPA на GitHub Pages: любой «глубокий» URL отдаёт index.html
      - name: SPA fallback (404)
        run: cp dist/index.html dist/404.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
        with:
          # Pages API иногда отдаёт промежуточные ошибки при опросе статуса —
          # даём больше попыток и времени, чтобы деплой не падал из-за них.
          timeout: 600000
          error_count: 25
