name: Deploy to GitHub Pages

# Сборка фронтенда и публикация на GitHub Pages при каждом push в main.
# Ключи облачного Supabase берутся из секретов репозитория:
#   Settings → Secrets and variables → Actions → New repository secret
#     VITE_SUPABASE_URL       = https://<твой-проект>.supabase.co
#     VITE_SUPABASE_ANON_KEY  = <anon public key>
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      # SPA на GitHub Pages: любой «глубокий» URL отдаёт index.html
      - name: SPA fallback (404)
        run: cp dist/index.html dist/404.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
